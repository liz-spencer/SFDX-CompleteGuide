# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: SFDX Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli
      - run: npm ci
      - run: npm test

      - name: Salesforce SFDX CLI Action
        uses: sfdx-actions/setup-sfdx@v1
        with:
          sfdx-auth-url: ${{ secrets.DEVHUB_URL }}
      
      - name: Authenticate Dev Hub
        run: |
          echo "${{ secrets.DEVHUB_URL }}" > sfdx-auth-url.txt
          sf org login sfdx-url --sfdx-url-file sfdx-auth-url.txt --alias vscodeOrg --set-default-dev-hub

      # - name: Set Default DevHub
      #   run: sf config set target-dev-hub=vscodeOrg
        
      # #Create a scratch org to test our code
      # - name: Create Scratch Org
      #   run: sf org create scratch -f config/project-scratch-def.json -d -y 1 -a actionBuild -v vscodeOrg      

      # #Pushes all configs to scratch org
      # - name: Push to Scratch Org
      #   run: sf project deploy start -o actionBuild
      
      # #Run Apex Tests
      # - name: Run Apex Tests
      #   run: sf apex test run -l RunLocalTests -w 30 -o actionBuild 
      
      # #Delete Scratch Org after successful build  
      # - name: Delete Scratch Org
      #   run: sf org delete scratch --target-org actionBuild -p

      #Debugging
      - name: List Orgs
        run: sf org list